spring:
  application:
    name: peugether

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:fgather}
    username: ${DB_USERNAME:fgather}
    password: ${DB_PASSWORD:fgatherpw}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  web:
    cors:
      allowed-origins: "${CORS_ALLOWED_ORIGINS:http://localhost:3000}"
      allowed-methods: "GET,POST,PATCH,PUT,DELETE,OPTIONS"
      allowed-headers: "Content-Type,Authorization"
      allow-credentials: true
      max-age: 3600

kakao:
  oauth:
    client-id: ${KAKAO_CLIENT_ID}
    client-secret: ${KAKAO_CLIENT_SECRET}
    redirect-uri: ${KAKAO_REDIRECT_URI}

jwt:
  secret: ${JWT_SECRET}
  access-token-expiry: 1800       # 30분 (초)
  refresh-token-expiry: 1209600   # 14일 (초)

fee:
  default-rate: ${FEE_DEFAULT_RATE:0.05}
  default-fixed: ${FEE_DEFAULT_FIXED:}

app:
  invite-link-base-url: ${INVITE_LINK_BASE_URL:https://peugether.co/invent}
  recipient-link-base-url: ${RECIPIENT_LINK_BASE_URL:https://peugether.co/recipient}
  frontend-url: ${FRONTEND_URL:http://172.16.20.81:5173}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
